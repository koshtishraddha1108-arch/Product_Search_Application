<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Library Management System</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
    padding:20px;
}

.container{
    max-width:800px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

.form-group{
    margin-bottom:15px;
}

input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    padding:10px 20px;
    background:#28a745;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#218838;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

table, th, td{
    border:1px solid #ddd;
}

th{
    background:#007bff;
    color:white;
    padding:10px;
}

td{
    padding:10px;
    text-align:center;
}

.delete-btn{
    background:red;
    padding:8px 12px;
    border:none;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

.delete-btn:hover{
    background:darkred;
}

.total-books{
    margin-top:15px;
    font-size:18px;
    font-weight:bold;
    color:#333;
}
</style>
</head>
<body>

<div class="container">
    <h1>📚 Library Management System</h1>

    <div class="form-group">
        <input type="text" id="bookName" placeholder="Enter Book Name">
    </div>

    <div class="form-group">
        <input type="text" id="authorName" placeholder="Enter Author Name">
    </div>

    <div class="form-group">
        <input type="text" id="category" placeholder="Enter Category">
    </div>

    <button onclick="addBook()">Add Book</button>

    <table id="bookTable">
        <thead>
            <tr>
                <th>Book Name</th>
                <th>Author</th>
                <th>Category</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>

    <div class="total-books">
        Total Books: <span id="totalBooks">0</span>
    </div>
</div>

<script>
function addBook() {
    let bookName = document.getElementById("bookName").value;
    let authorName = document.getElementById("authorName").value;
    let category = document.getElementById("category").value;

    if(bookName === "" || authorName === "" || category === ""){
        alert("Please fill all fields!");
        return;
    }

    let table = document.getElementById("bookTable").getElementsByTagName("tbody")[0];

    let row = table.insertRow();

    row.insertCell(0).innerHTML = bookName;
    row.insertCell(1).innerHTML = authorName;
    row.insertCell(2).innerHTML = category;

    let actionCell = row.insertCell(3);
    actionCell.innerHTML =
        '<button class="delete-btn" onclick="deleteBook(this)">Delete</button>';

    document.getElementById("bookName").value = "";
    document.getElementById("authorName").value = "";
    document.getElementById("category").value = "";

    updateTotalBooks();
}

function deleteBook(button) {
    let row = button.parentNode.parentNode;
    row.remove();
    updateTotalBooks();
}

function updateTotalBooks() {
    let total = document.querySelectorAll("#bookTable tbody tr").length;
    document.getElementById("totalBooks").innerText = total;
}
</script>

</body>
</html>
